<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LinkExt — Votre hub de liens nouvelle génération</title>

    <!-- Font Awesome 6 (icônes) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts : Inter (moderne & lisible) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">

    <!-- Firebase SDK (compat mode, aucun build nécessaire) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-deep: #0d0d11;
            --glass-bg: rgba(22, 22, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bg-hover: rgba(28, 28, 40, 0.78);
            --accent-1: #4facfe;
            --accent-2: #00f2fe;
            --accent-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --accent-glow: rgba(79, 172, 254, 0.35);
            --text-primary: #f0f0f5;
            --text-secondary: #b0b0c0;
            --text-muted: #6b6b7a;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            --whatsapp: #25D366;
            --telegram: #0088cc;
            --facebook: #1877F2;
            --instagram: #E4405F;
            --youtube: #FF0000;
            --x-twitter: #1DA1F2;
            --tiktok: #fe2c55;
            --radius-lg: 22px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --radius-full: 50%;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            --shadow-glass: 0 10px 40px rgba(0, 0, 0, 0.6), 0 2px 10px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 50px var(--accent-glow), 0 0 100px rgba(79, 172, 254, 0.15);
            --font-stack: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
            height: 100%;
        }

        body {
            font-family: var(--font-stack);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
            padding: 0;
            margin: 0;
        }

        /* Fond animé avec orbes */
        .bg-aurora {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-aurora .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.45;
            will-change: transform;
        }
        .bg-aurora .orb:nth-child(1) {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.4) 0%, transparent 70%);
            top: -20%;
            left: -15%;
            animation: floatOrb 16s ease-in-out infinite;
        }
        .bg-aurora .orb:nth-child(2) {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.4) 0%, transparent 70%);
            bottom: -15%;
            right: -10%;
            animation: floatOrb 18s ease-in-out infinite;
            animation-delay: -5s;
        }
        .bg-aurora .orb:nth-child(3) {
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, rgba(120, 80, 255, 0.3) 0%, transparent 70%);
            top: 60%;
            left: 70%;
            animation: floatOrb 20s ease-in-out infinite;
            animation-delay: -9s;
        }

        @keyframes floatOrb {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(70px, -60px) scale(1.12);
            }
            50% {
                transform: translate(-40px, 50px) scale(0.88);
            }
            75% {
                transform: translate(-60px, -35px) scale(1.08);
            }
        }

        /* Conteneur principal */
        .app-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 540px;
            margin: 0 auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            justify-content: center;
            gap: 18px;
        }

        /* Glassmorphisme */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-glass);
            transition: var(--transition-smooth);
        }
        .glass:hover {
            background: var(--glass-bg-hover);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: var(--shadow-glass), 0 0 35px rgba(79, 172, 254, 0.08);
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-glass);
            padding: 22px 20px;
            transition: var(--transition-smooth);
            width: 100%;
        }
        .glass-input {
            background: rgba(18, 18, 28, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            padding: 14px 16px;
            font-size: 0.95rem;
            font-family: var(--font-stack);
            width: 100%;
            transition: var(--transition-fast);
            outline: none;
        }
        .glass-input:focus {
            border-color: var(--accent-1);
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.15);
            background: rgba(24, 24, 38, 0.85);
        }
        .glass-input::placeholder {
            color: var(--text-muted);
        }

        /* Boutons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            font-family: var(--font-stack);
            cursor: pointer;
            border: none;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            white-space: nowrap;
            letter-spacing: 0.02em;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn:active {
            transform: scale(0.96);
            transition: var(--transition-fast);
        }
        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 4px 22px rgba(79, 172, 254, 0.45);
            font-weight: 700;
        }
        .btn-primary:hover {
            box-shadow: 0 6px 28px rgba(79, 172, 254, 0.6);
            transform: translateY(-2px);
        }
        .btn-primary:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(20%);
        }
        .btn-google {
            background: #ffffff;
            color: #1a1a2e;
            font-weight: 600;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.3);
        }
        .btn-google:hover {
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }
        .btn-google img {
            width: 20px;
            height: 20px;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            color: var(--text-primary);
        }
        .btn-outline:hover {
            border-color: var(--accent-1);
            background: rgba(79, 172, 254, 0.08);
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 0.8rem;
            border-radius: 30px;
        }
        .btn-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-full);
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.13);
            border-color: rgba(255, 255, 255, 0.25);
        }
        .btn-icon.danger {
            color: var(--danger);
            border-color: rgba(255, 71, 87, 0.35);
        }
        .btn-icon.danger:hover {
            background: rgba(255, 71, 87, 0.15);
            border-color: rgba(255, 71, 87, 0.6);
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .spinner-sm {
            width: 16px;
            height: 16px;
            border-width: 2px;
        }

        /* Loader global */
        .global-loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(6, 6, 14, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: opacity 0.4s ease;
            pointer-events: all;
        }
        .global-loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .global-loader .loader-ring {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-1);
            animation: spin 0.9s linear infinite;
            box-shadow: 0 0 40px var(--accent-glow);
        }

        /* Toasts */
        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            width: 90%;
            max-width: 450px;
        }
        .toast {
            padding: 14px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.88rem;
            text-align: center;
            pointer-events: auto;
            animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), toastOut 0.35s ease 3s forwards;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.02em;
        }
        .toast.success {
            background: rgba(46, 213, 115, 0.25);
            border: 1px solid rgba(46, 213, 115, 0.5);
            color: #2ed573;
        }
        .toast.error {
            background: rgba(255, 71, 87, 0.25);
            border: 1px solid rgba(255, 71, 87, 0.5);
            color: #ff6b7a;
        }
        .toast.info {
            background: rgba(79, 172, 254, 0.25);
            border: 1px solid rgba(79, 172, 254, 0.5);
            color: #7ec8ff;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateY(-20px) scale(0.85);
            }
        }

        /* Vues */
        .view {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            animation: fadeSlideIn 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .view.active {
            display: flex;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .view-title {
            font-size: 1.7rem;
            font-weight: 800;
            text-align: center;
            letter-spacing: -0.02em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .view-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: center;
            font-weight: 400;
            margin-bottom: 6px;
        }
        .separator {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            width: 100%;
            margin: 8px 0;
        }
        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Auth */
        .auth-tabs {
            display: flex;
            background: rgba(18, 18, 28, 0.7);
            border-radius: 50px;
            padding: 5px;
            width: 100%;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            margin-bottom: 16px;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition-smooth);
            color: var(--text-muted);
            user-select: none;
        }
        .auth-tab.active {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 4px 16px rgba(79, 172, 254, 0.4);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }
        .auth-form.hidden {
            display: none;
        }
        .error-banner {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid rgba(255, 71, 87, 0.45);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: #ff6b7a;
            font-size: 0.85rem;
            font-weight: 500;
            display: none;
            width: 100%;
            text-align: center;
            animation: fadeSlideIn 0.3s ease;
        }
        .error-banner.visible {
            display: block;
        }

        /* Onboarding */
        .platform-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            width: 100%;
            margin: 8px 0;
        }
        .platform-chip {
            padding: 10px 16px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.14);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: var(--transition-smooth);
            user-select: none;
            display: flex;
            align-items: center;
            gap: 7px;
            color: var(--text-secondary);
        }
        .platform-chip i {
            font-size: 1rem;
            width: 20px;
            text-align: center;
        }
        .platform-chip.selected {
            background: rgba(79, 172, 254, 0.2);
            border-color: var(--accent-1);
            color: #fff;
            box-shadow: 0 0 18px rgba(79, 172, 254, 0.35);
        }

        /* Dashboard */
        .avatar-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
            margin: 0 auto;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: var(--radius-full);
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px var(--accent-glow);
            transition: var(--transition-smooth);
        }
        .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: var(--radius-full);
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: 800;
            color: #fff;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px var(--accent-glow);
            letter-spacing: -0.03em;
        }
        .avatar-upload-btn {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 34px;
            height: 34px;
            border-radius: var(--radius-full);
            background: var(--accent-gradient);
            border: 2px solid var(--bg-deep);
            color: #fff;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
        }
        .avatar-upload-btn:hover {
            transform: scale(1.1);
        }

        /* Lien dashboard */
        .link-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(18, 18, 28, 0.6);
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: var(--transition-smooth);
            width: 100%;
            flex-wrap: wrap;
        }
        .link-item:hover {
            border-color: rgba(255, 255, 255, 0.18);
            background: rgba(24, 24, 38, 0.75);
        }
        .link-item .platform-icon {
            font-size: 1.4rem;
            width: 32px;
            text-align: center;
            flex-shrink: 0;
        }
        .link-item input {
            flex: 1;
            min-width: 120px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: var(--font-stack);
            font-size: 0.9rem;
            outline: none;
            padding: 6px 0;
        }
        .link-item input::placeholder {
            color: var(--text-muted);
        }
        .click-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .click-badge i {
            color: var(--accent-1);
        }

        /* Toggle switch */
        .toggle-switch {
            position: relative;
            width: 48px;
            height: 26px;
            flex-shrink: 0;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 26px;
            transition: var(--transition-smooth);
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: var(--transition-smooth);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        }
        .toggle-switch input:checked+.toggle-slider {
            background: var(--accent-gradient);
            box-shadow: 0 0 14px rgba(79, 172, 254, 0.5);
        }
        .toggle-switch input:checked+.toggle-slider::before {
            transform: translateX(22px);
        }

        /* Page publique */
        .public-avatar {
            width: 110px;
            height: 110px;
            border-radius: var(--radius-full);
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 50px var(--accent-glow), 0 0 100px rgba(79, 172, 254, 0.2);
            transition: var(--transition-smooth);
        }
        .public-avatar-placeholder {
            width: 110px;
            height: 110px;
            border-radius: var(--radius-full);
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            border: 4px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 50px var(--accent-glow), 0 0 100px rgba(79, 172, 254, 0.2);
            letter-spacing: -0.03em;
        }
        .public-link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            color: #fff;
            transition: var(--transition-bounce);
            letter-spacing: 0.02em;
            border: none;
            cursor: pointer;
            font-family: var(--font-stack);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
            position: relative;
            overflow: hidden;
        }
        .public-link-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.6);
        }
        .public-link-btn:active {
            transform: scale(0.97);
            transition: var(--transition-fast);
        }
        .public-link-btn i {
            font-size: 1.3rem;
        }
        .footer-brand {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.78rem;
            font-weight: 500;
            margin-top: 16px;
            letter-spacing: 0.03em;
        }
        .footer-brand span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }
        .logout-btn {
            position: absolute;
            top: 16px;

            padding: 8px 14px;

            font-size: 0.8rem;

        /* Responsive */
        @media (max-width: 480px) {
            .app-container {

                gap: 12px;

            .glass-card {

                font-size: 0.9rem;

                padding: 14px 18px;
                font-size: 0.9rem;

            .avatar-wrapper,
            .public-avatar,
            .public-avatar-placeholder {
                width: 85px;
                height: 85px;

                font-size: 0.85rem;
            }
            .logout-btn {
                top: 8px;
                right: 8px;
                padding: 6px 12px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- Fond animé -->
    <div class="bg-aurora">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>

    <!-- Loader global -->
    <div class="global-loader" id="globalLoader">
        <div class="loader-ring"></div>
    </div>

    <!-- Conteneur toasts -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Application -->
    <div class="app-container" id="appContainer">

        <!-- ========== VUE AUTH ========== -->
        <div class="view" id="viewAuth">
            <div class="glass-card" style="width:100%;max-width:420px;">
                <div class="auth-tabs">
                    <div class="auth-tab active" data-tab="login" id="tabLogin">Connexion</div>
                    <div class="auth-tab" data-tab="register" id="tabRegister">Inscription</div>
                </div>
                <div class="error-banner" id="authError"></div>
                <form class="auth-form" id="formLogin">
                    <input type="email" class="glass-input" placeholder="vous@exemple.com" id="loginEmail" required autocomplete="email">
                    <input type="password" class="glass-input" placeholder="Mot de passe" id="loginPassword" required autocomplete="current-password">
                    <button type="submit" class="btn btn-primary" style="width:100%;" id="btnLoginSubmit">
                        <span id="btnLoginText">Se connecter</span>
                        <span class="spinner spinner-sm" id="btnLoginSpinner" style="display:none;"></span>
                    </button>
                </form>
                <form class="auth-form hidden" id="formRegister">
                    <input type="email" class="glass-input" placeholder="vous@exemple.com" id="registerEmail" required autocomplete="email">
                    <input type="password" class="glass-input" placeholder="Mot de passe (6+ caractères)" id="registerPassword" required autocomplete="new-password" minlength="6">
                    <button type="submit" class="btn btn-primary" style="width:100%;" id="btnRegisterSubmit">
                        <span id="btnRegisterText">Créer un compte</span>
                        <span class="spinner spinner-sm" id="btnRegisterSpinner" style="display:none;"></span>
                    </button>
                </form>
                <div class="separator">ou</div>
                <button class="btn btn-google" style="width:100%;" id="btnGoogleAuth">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath fill='%23EA4335' d='M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z'/%3E%3Cpath fill='%234285F4' d='M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z'/%3E%3Cpath fill='%23FBBC05' d='M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.95 16.46 0 20.12 0 24c0 3.88.95 7.54 2.56 10.78l7.97-6.19z'/%3E%3Cpath fill='%2334A853' d='M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z'/%3E%3C/svg%3E" alt="Google">
                    Continuer avec Google
                </button>
            </div>
        </div>

        <!-- ========== VUE ONBOARDING ========== -->
        <div class="view" id="viewOnboarding">
            <div class="glass-card" style="width:100%;max-width:480px;">
                <h2 class="view-title" style="margin-bottom:8px;">Configurons votre profil</h2>
                <p class="view-subtitle">Choisissez vos réseaux et ajoutez une bio</p>
                <p style="font-weight:600;font-size:0.9rem;margin:8px 0;color:var(--text-secondary);">📱 Vos plateformes</p>
                <div class="platform-grid" id="onboardingPlatforms">
                    <div class="platform-chip" data-platform="whatsapp"><i class="fab fa-whatsapp" style="color:#25D366;"></i> WhatsApp</div>
                    <div class="platform-chip" data-platform="telegram"><i class="fab fa-telegram-plane" style="color:#0088cc;"></i> Telegram</div>
                    <div class="platform-chip" data-platform="facebook"><i class="fab fa-facebook" style="color:#1877F2;"></i> Facebook</div>
                    <div class="platform-chip" data-platform="instagram"><i class="fab fa-instagram" style="color:#E4405F;"></i> Instagram</div>
                    <div class="platform-chip" data-platform="youtube"><i class="fab fa-youtube" style="color:#FF0000;"></i> YouTube</div>
                    <div class="platform-chip" data-platform="x"><i class="fab fa-x-twitter"></i> X (Twitter)</div>
                    <div class="platform-chip" data-platform="tiktok"><i class="fab fa-tiktok"></i> TikTok</div>
                </div>
                <textarea class="glass-input" id="onboardingBio" placeholder="Décrivez-vous en quelques mots..." rows="3" style="margin-top:14px;resize:vertical;min-height:70px;"></textarea>
                <div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;">
                    <button class="btn btn-primary" id="btnFinishOnboarding" style="flex:1;min-width:160px;">
                        <span id="btnFinishOnboardingText">Finaliser et créer mon profil</span>
                        <span class="spinner spinner-sm" id="btnFinishOnboardingSpinner" style="display:none;"></span>
                    </button>
                    <button class="btn btn-outline" id="btnSkipOnboarding" style="flex:1;min-width:130px;">Passer l'étape</button>
                </div>
            </div>
        </div>

        <!-- ========== VUE DASHBOARD ========== -->
        <div class="view" id="viewDashboard">
            <button class="logout-btn" id="btnLogout"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
            <div class="glass-card" style="width:100%;max-width:500px;display:flex;flex-direction:column;align-items:center;gap:16px;">
                <div class="avatar-wrapper" id="dashboardAvatarWrapper">
                    <div class="avatar-placeholder" id="dashboardAvatarPlaceholder">?</div>
                    <img class="avatar-img" id="dashboardAvatarImg" src="" alt="Photo de profil" style="display:none;">
                    <button class="avatar-upload-btn" id="btnUploadAvatar" title="Changer la photo de profil"><i class="fas fa-camera"></i></button>
                    <input type="file" id="avatarFileInput" accept="image/*" style="display:none;">
                </div>
                <input type="text" class="glass-input" id="dashboardDisplayName" placeholder="Votre nom affiché" style="text-align:center;font-weight:600;font-size:1.1rem;">
                <textarea class="glass-input" id="dashboardBio" placeholder="Votre biographie..." rows="2" style="resize:vertical;min-height:50px;text-align:center;"></textarea>
                <div style="width:100%;text-align:center;">
                    <button class="btn btn-outline btn-sm" id="btnUploadPreview"><i class="fas fa-image"></i> Téléverser l'image d'aperçu</button>
                    <input type="file" id="previewFileInput" accept="image/*" style="display:none;">
                    <div id="previewThumbnailContainer" style="margin-top:8px;display:none;">
                        <img id="previewThumbnail" src="" alt="Aperçu" style="max-width:100%;max-height:120px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);">
                    </div>
                </div>
            </div>

            <div class="glass-card" style="width:100%;max-width:500px;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
                    <h3 style="font-size:1.1rem;font-weight:700;">🔗 Vos liens</h3>
                    <button class="btn btn-outline btn-sm" id="btnAddLink"><i class="fas fa-plus"></i> Ajouter</button>
                </div>
                <div id="linksContainer" style="display:flex;flex-direction:column;gap:10px;"></div>
                <p id="noLinksMsg" style="text-align:center;color:var(--text-muted);font-size:0.85rem;padding:20px 0;">Aucun lien pour le moment.</p>
            </div>

            <button class="btn btn-primary" id="btnSaveDashboard" style="width:100%;max-width:500px;">
                <span id="btnSaveDashboardText">Enregistrer les modifications</span>
                <span class="spinner spinner-sm" id="btnSaveDashboardSpinner" style="display:none;"></span>
            </button>
        </div>

        <!-- ========== VUE PROFIL PUBLIC ========== -->
        <div class="view" id="viewPublicProfile">
            <div style="display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;max-width:460px;">
                <div id="publicAvatarPlaceholder" class="public-avatar-placeholder">?</div>
                <img id="publicAvatarImg" class="public-avatar" src="" alt="Photo de profil" style="display:none;">
                <h2 id="publicDisplayName" style="font-size:1.5rem;font-weight:700;text-align:center;color:var(--text-primary);"></h2>
                <p id="publicBio" style="color:var(--text-secondary);text-align:center;font-size:0.95rem;line-height:1.5;"></p>
                <div id="publicLinksContainer" style="display:flex;flex-direction:column;gap:12px;width:100%;"></div>
                <div class="footer-brand">Propulsé par <span>LinkExt</span></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== CONFIGURATION ====================
            // Remplacez ces valeurs par vos vraies clés Firebase et Cloudinary
            const firebaseConfig = {
                apiKey: "AIzaSyD5nsm14JGZfjgQE1iDogJAEF6VV_gEHxw", // ← complétez avec votre clé API
                authDomain: "linkext1.firebaseapp.com",
                projectId: "linkext1",
                storageBucket: "linkext1.appspot.com",
                messagingSenderId: "1234567890",
                appId: "1:1234567890:web:abcdef"
            };

            const CLOUDINARY_CLOUD_NAME = "bwexb1sj";
            const CLOUDINARY_UPLOAD_PRESET = "LinkExt";

            // ==================== INITIALISATION FIREBASE ====================
            let firebaseReady = false;
            let auth, db;

            try {
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
                firebaseReady = true;
                console.log('✅ Firebase initialisé');
            } catch (err) {
                console.warn('⚠️ Firebase non configuré — mode démo limité.', err);
                showToast('Firebase non configuré. Certaines fonctionnalités seront désactivées.', 'info');
            }

            // ==================== RÉFÉRENCES DOM ====================
            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);

            const globalLoader = $('#globalLoader');
            const toastContainer = $('#toastContainer');
            const viewAuth = $('#viewAuth');
            const viewOnboarding = $('#viewOnboarding');
            const viewDashboard = $('#viewDashboard');
            const viewPublicProfile = $('#viewPublicProfile');
            const allViews = [viewAuth, viewOnboarding, viewDashboard, viewPublicProfile];

            // Auth
            const tabLogin = $('#tabLogin');
            const tabRegister = $('#tabRegister');
            const formLogin = $('#formLogin');
            const formRegister = $('#formRegister');
            const authError = $('#authError');
            const btnGoogleAuth = $('#btnGoogleAuth');
            const loginEmail = $('#loginEmail');
            const loginPassword = $('#loginPassword');
            const registerEmail = $('#registerEmail');
            const registerPassword = $('#registerPassword');

            // Onboarding
            const onboardingPlatformsContainer = $('#onboardingPlatforms');
            const onboardingBio = $('#onboardingBio');
            const btnFinishOnboarding = $('#btnFinishOnboarding');
            const btnSkipOnboarding = $('#btnSkipOnboarding');

            // Dashboard
            const dashboardAvatarPlaceholder = $('#dashboardAvatarPlaceholder');
            const dashboardAvatarImg = $('#dashboardAvatarImg');
            const btnUploadAvatar = $('#btnUploadAvatar');
            const avatarFileInput = $('#avatarFileInput');
            const dashboardDisplayName = $('#dashboardDisplayName');
            const dashboardBio = $('#dashboardBio');
            const btnUploadPreview = $('#btnUploadPreview');
            const previewFileInput = $('#previewFileInput');
            const previewThumbnailContainer = $('#previewThumbnailContainer');
            const previewThumbnail = $('#previewThumbnail');
            const linksContainer = $('#linksContainer');
            const noLinksMsg = $('#noLinksMsg');
            const btnAddLink = $('#btnAddLink');
            const btnSaveDashboard = $('#btnSaveDashboard');
            const btnLogout = $('#btnLogout');

            // Public
            const publicAvatarPlaceholder = $('#publicAvatarPlaceholder');
            const publicAvatarImg = $('#publicAvatarImg');
            const publicDisplayName = $('#publicDisplayName');
            const publicBio = $('#publicBio');
            const publicLinksContainer = $('#publicLinksContainer');

            // ==================== ÉTAT ====================
            let currentUser = null;
            let userProfile = null; // doc Firestore userProfiles/{uid}
            let selectedOnboardingPlatforms = new Set();
            let localLinks = []; // liens en édition (tableau d'objets avec id, platform, url, active, clicks)
            let originalLinks = []; // sauvegarde pour diff
            let currentView = null;
            let publicProfileUid = null;
            let isSaving = false;

            // ==================== HELPERS ====================
            function showLoader() { globalLoader.classList.remove('hidden'); }

            function hideLoader() { globalLoader.classList.add('hidden'); }

            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                toastContainer.appendChild(toast);
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3300);
            }

            function showView(viewElement) {
                if (currentView === viewElement) return;
                allViews.forEach(v => v.classList.remove('active'));
                viewElement.classList.add('active');
                currentView = viewElement;
                viewElement.style.animation = 'none';
                viewElement.offsetHeight;
                viewElement.style.animation = '';
            }

            function showAuthError(msg) {
                authError.textContent = msg;
                authError.classList.add('visible');
                setTimeout(() => authError.classList.remove('visible'), 5000);
            }

            function clearAuthError() { authError.classList.remove('visible'); }

            function setButtonLoading(btn, spinner, text, isLoading) {
                btn.disabled = isLoading;
                if (spinner) spinner.style.display = isLoading ? 'inline-block' : 'none';
                if (text) text.style.opacity = isLoading ? '0.5' : '1';
            }

            function getInitial(name) {
                if (!name || !name.trim()) return '?';
                return name.trim().charAt(0).toUpperCase();
            }

            function generateId() {
                return Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 9);
            }

            // Plateformes
            const PLATFORMS = {
                whatsapp: { name: 'WhatsApp', icon: 'fab fa-whatsapp', color: '#25D366', bgColor: '#25D366' },
                telegram: { name: 'Telegram', icon: 'fab fa-telegram-plane', color: '#0088cc', bgColor: '#0088cc' },
                facebook: { name: 'Facebook', icon: 'fab fa-facebook', color: '#1877F2', bgColor: '#1877F2' },
                instagram: { name: 'Instagram', icon: 'fab fa-instagram', color: '#E4405F',
                    bgColor: 'linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888)' },
                youtube: { name: 'YouTube', icon: 'fab fa-youtube', color: '#FF0000', bgColor: '#FF0000' },
                x: { name: 'X (Twitter)', icon: 'fab fa-x-twitter', color: '#1DA1F2', bgColor: '#1DA1F2' },
                tiktok: { name: 'TikTok', icon: 'fab fa-tiktok', color: '#fe2c55', bgColor: '#111' },
                site: { name: 'Site web', icon: 'fas fa-globe', color: '#aaa', bgColor: '#444' },
                autre: { name: 'Autre', icon: 'fas fa-link', color: '#ccc', bgColor: '#555' }
            };

            // ==================== CLOUDINARY ====================
            async function uploadToCloudinary(file) {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                formData.append('folder', 'linkext');
                const url = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`;
                const response = await fetch(url, { method: 'POST', body: formData });
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || 'Échec upload Cloudinary');
                }
                const data = await response.json();
                return data.secure_url;
            }

            // ==================== FIRESTORE ====================
            async function fetchUserProfile(uid) {
                if (!firebaseReady) return null;
                const docRef = db.collection('userProfiles').doc(uid);
                const snap = await docRef.get();
                return snap.exists ? { id: snap.id, ...snap.data() } : null;
            }

            async function saveUserProfile(uid, data) {
                if (!firebaseReady) throw new Error('Firebase non disponible');
                const docRef = db.collection('userProfiles').doc(uid);
                await docRef.set({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
            }

            async function fetchUserLinks(uid) {
                if (!firebaseReady) return [];
                const snapshot = await db.collection('userProfiles').doc(uid).collection('links').orderBy('createdAt',
                    'asc').get();
                return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            }

            async function saveLinksBatch(uid, linksToSave, linksToDelete) {
                if (!firebaseReady) throw new Error('Firebase indisponible');
                const batch = db.batch();
                const linksCol = db.collection('userProfiles').doc(uid).collection('links');

                for (const link of linksToSave) {
                    const docRef = link.id ? linksCol.doc(link.id) : linksCol.doc(); // nouvel id si absent
                    const data = {
                        platform: link.platform,
                        url: link.url || '',
                        active: link.active !== false,
                        clicks: link.clicks || 0,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    if (!link.id) data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    batch.set(docRef, data, { merge: true });
                }

                for (const linkId of linksToDelete) {
                    batch.delete(linksCol.doc(linkId));
                }

                await batch.commit();
            }

            async function incrementLinkClick(uid, linkId) {
                if (!firebaseReady) return;
                const docRef = db.collection('userProfiles').doc(uid).collection('links').doc(linkId);
                await docRef.update({ clicks: firebase.firestore.FieldValue.increment(1) });
            }

            // ==================== ROUTEUR & AUTH ====================
            function switchAuthTab(tab) {
                if (tab === 'login') {
                    tabLogin.classList.add('active');
                    tabRegister.classList.remove('active');
                    formLogin.classList.remove('hidden');
                    formRegister.classList.add('hidden');
                } else {
                    tabRegister.classList.add('active');
                    tabLogin.classList.remove('active');
                    formRegister.classList.remove('hidden');
                    formLogin.classList.add('hidden');
                }
                clearAuthError();
            }

            async function handleLogin(email, password) {
                if (!firebaseReady) { showToast('Firebase non configuré', 'error'); return; }
                setButtonLoading($('#btnLoginSubmit'), $('#btnLoginSpinner'), $('#btnLoginText'), true);
                clearAuthError();
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    showToast('Connexion réussie !', 'success');
                } catch (err) {
                    let msg = 'Erreur de connexion.';
                    if (err.code === 'auth/user-not-found') msg = 'Aucun compte trouvé.';
                    else if (err.code === 'auth/wrong-password') msg = 'Mot de passe incorrect.';
                    else if (err.code === 'auth/invalid-email') msg = 'Email invalide.';
                    else if (err.code === 'auth/invalid-credential') msg = 'Identifiants incorrects.';
                    else msg = err.message;
                    showAuthError(msg);
                }
                setButtonLoading($('#btnLoginSubmit'), $('#btnLoginSpinner'), $('#btnLoginText'), false);
            }

            async function handleRegister(email, password) {
                if (!firebaseReady) { showToast('Firebase non configuré', 'error'); return; }
                if (password.length < 6) { showAuthError('6 caractères minimum.'); return; }
                setButtonLoading($('#btnRegisterSubmit'), $('#btnRegisterSpinner'), $('#btnRegisterText'), true);
                clearAuthError();
                try {
                    await auth.createUserWithEmailAndPassword(email, password);
                    showToast('Compte créé ! 🎉', 'success');
                } catch (err) {
                    let msg = 'Erreur inscription.';
                    if (err.code === 'auth/email-already-in-use') msg = 'Email déjà utilisé.';
                    else if (err.code === 'auth/weak-password') msg = 'Mot de passe trop faible.';
                    else msg = err.message;
                    showAuthError(msg);
                }
                setButtonLoading($('#btnRegisterSubmit'), $('#btnRegisterSpinner'), $('#btnRegisterText'), false);
            }

            async function handleGoogleAuth() {
                if (!firebaseReady) { showToast('Firebase indisponible', 'error'); return; }
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                } catch (err) {
                    if (err.code !== 'auth/popup-closed-by-user') {
                        showToast('Erreur Google : ' + err.message, 'error');
                    }
                }
            }

            async function handleLogout() {
                if (!firebaseReady) return;
                await auth.signOut();
                currentUser = null;
                userProfile = null;
                localLinks = [];
                showToast('Déconnexion', 'info');
                navigateToAuth();
            }

            // ==================== NAVIGATION ====================
            async function navigateToAuth() {
                showView(viewAuth);
                loginEmail.value = '';
                loginPassword.value = '';
                registerEmail.value = '';
                registerPassword.value = '';
                switchAuthTab('login');
            }

            async function navigateToOnboarding() {
                showView(viewOnboarding);
                selectedOnboardingPlatforms.clear();
                onboardingBio.value = userProfile?.bio || '';
                $$('#onboardingPlatforms .platform-chip').forEach(chip => chip.classList.remove('selected'));
                if (userProfile?.onboardingPlatforms) {
                    userProfile.onboardingPlatforms.forEach(p => {
                        selectedOnboardingPlatforms.add(p);
                        const chip = $(`#onboardingPlatforms .platform-chip[data-platform="${p}"]`);
                        if (chip) chip.classList.add('selected');
                    });
                }
            }

            async function navigateToDashboard() {
                if (!currentUser || !firebaseReady) { navigateToAuth(); return; }
                showLoader();
                try {
                    userProfile = await fetchUserProfile(currentUser.uid);
                    if (!userProfile) {
                        // Créer profil par défaut
                        const defaultProfile = {
                            displayName: currentUser.email ? currentUser.email.split('@')[0] : 'Utilisateur',
                            bio: '',
                            photoURL: '',
                            previewImageURL: '',
                            onboardingCompleted: false,
                            onboardingPlatforms: [],
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        };
                        await saveUserProfile(currentUser.uid, defaultProfile);
                        userProfile = await fetchUserProfile(currentUser.uid);
                    }
                    if (!userProfile.onboardingCompleted) {
                        hideLoader();
                        navigateToOnboarding();
                        return;
                    }
                    // Charger liens
                    const links = await fetchUserLinks(currentUser.uid);
                    localLinks = links.map(l => ({ ...l }));
                    originalLinks = JSON.parse(JSON.stringify(localLinks));
                    populateDashboard();
                    showView(viewDashboard);
                } catch (err) {
                    console.error(err);
                    showToast('Erreur chargement dashboard', 'error');
                    navigateToAuth();
                }
                hideLoader();
            }

            function populateDashboard() {
                if (!userProfile) return;
                dashboardDisplayName.value = userProfile.displayName || '';
                dashboardBio.value = userProfile.bio || '';
                updateDashboardAvatar(userProfile.photoURL, userProfile.displayName);
                if (userProfile.previewImageURL) {
                    previewThumbnail.src = userProfile.previewImageURL;
                    previewThumbnailContainer.style.display = 'block';
                } else {
                    previewThumbnailContainer.style.display = 'none';
                }
                renderLinks();
            }

            function updateDashboardAvatar(photoURL, displayName) {
                if (photoURL) {
                    dashboardAvatarImg.src = photoURL;
                    dashboardAvatarImg.style.display = 'block';
                    dashboardAvatarPlaceholder.style.display = 'none';
                } else {
                    dashboardAvatarImg.style.display = 'none';
                    dashboardAvatarPlaceholder.style.display = 'flex';
                    dashboardAvatarPlaceholder.textContent = getInitial(displayName);
                }
            }

            function renderLinks() {
                linksContainer.innerHTML = '';
                if (localLinks.length === 0) {
                    noLinksMsg.style.display = 'block';
                } else {
                    noLinksMsg.style.display = 'none';
                    localLinks.forEach((link, index) => {
                        const platform = PLATFORMS[link.platform] || PLATFORMS['autre'];
                        const div = document.createElement('div');
                        div.className = 'link-item';
                        div.innerHTML = `
                            <span class="platform-icon" style="color:${platform.color};"><i class="${platform.icon}"></i></span>
                            <select class="link-platform-select glass-input" style="width:auto;flex-shrink:0;padding:8px 10px;font-size:0.8rem;" data-index="${index}">
                                ${Object.entries(PLATFORMS).map(([key, p]) => `<option value="${key}" ${link.platform === key ? 'selected' : ''}>${p.name}</option>`).join('')}
                            </select>
                            <input type="url" class="link-url-input" placeholder="https://..." value="${link.url || ''}" data-index="${index}">
                            <div class="click-badge"><i class="fas fa-eye"></i> ${link.clicks || 0} clic(s)</div>
                            <label class="toggle-switch">
                                <input type="checkbox" class="link-toggle" data-index="${index}" ${link.active !== false ? 'checked' : ''}>
                                <span class="toggle-slider"></span>
                            </label>
                            <button class="btn-icon danger link-delete-btn" data-index="${index}"><i class="fas fa-trash-alt"></i></button>
                        `;
                        linksContainer.appendChild(div);
                    });
                    // Events
                    $$('.link-platform-select').forEach(sel => sel.addEventListener('change', (e) => {
                        const idx = parseInt(e.target.dataset.index);
                        localLinks[idx].platform = e.target.value;
                    }));
                    $$('.link-url-input').forEach(inp => inp.addEventListener('input', (e) => {
                        const idx = parseInt(e.target.dataset.index);
                        localLinks[idx].url = e.target.value;
                    }));
                    $$('.link-toggle').forEach(tog => tog.addEventListener('change', (e) => {
                        const idx = parseInt(e.target.dataset.index);
                        localLinks[idx].active = e.target.checked;
                    }));
                    $$('.link-delete-btn').forEach(btn => btn.addEventListener('click', (e) => {
                        const idx = parseInt(e.target.closest('.link-delete-btn').dataset.index);
                        localLinks.splice(idx, 1);
                        renderLinks();
                        showToast('Lien supprimé (enregistrez pour appliquer)', 'info');
                    }));
                }
            }

            async function navigateToPublicProfile(uid) {
                publicProfileUid = uid;
                showLoader();
                try {
                    const profile = await fetchUserProfile(uid);
                    if (!profile) {
                        showView(viewPublicProfile);
                        publicDisplayName.textContent = 'Profil introuvable';
                        publicBio.textContent = '';
                        publicAvatarPlaceholder.style.display = 'flex';
                        publicAvatarPlaceholder.textContent = '?';
                        publicAvatarImg.style.display = 'none';
                        publicLinksContainer.innerHTML = '';
                        hideLoader();
                        return;
                    }
                    // Avatar
                    if (profile.photoURL) {
                        publicAvatarImg.src = profile.photoURL;
                        publicAvatarImg.style.display = 'block';
                        publicAvatarPlaceholder.style.display = 'none';
                    } else {
                        publicAvatarImg.style.display = 'none';
                        publicAvatarPlaceholder.style.display = 'flex';
                        publicAvatarPlaceholder.textContent = getInitial(profile.displayName);
                    }
                    publicDisplayName.textContent = profile.displayName || 'Sans nom';
                    publicBio.textContent = profile.bio || '';

                    // Liens actifs
                    const links = await fetchUserLinks(uid);
                    const activeLinks = links.filter(l => l.active !== false);
                    publicLinksContainer.innerHTML = '';
                    if (activeLinks.length === 0) {
                        publicLinksContainer.innerHTML =
                            '<p style="text-align:center;color:var(--text-muted);">Aucun lien public.</p>';
                    } else {
                        activeLinks.forEach(link => {
                            const platform = PLATFORMS[link.platform] || PLATFORMS['autre'];
                            const a = document.createElement('a');
                            a.className = 'public-link-btn';
                            a.href = link.url || '#';
                            a.target = '_blank';
                            a.rel = 'noopener noreferrer';
                            a.style.background = platform.bgColor;
                            if (platform.bgColor.startsWith('linear-gradient')) a.style.background = platform
                                .bgColor;
                            a.innerHTML = `<i class="${platform.icon}"></i> ${platform.name}`;
                            a.addEventListener('click', async (e) => {
                                e.preventDefault();
                                // Incrémenter le compteur de clics
                                try {
                                    await incrementLinkClick(uid, link.id);
                                } catch (err) {
                                    console.warn('Erreur incrément clic:', err);
                                }
                                window.open(link.url || '#', '_blank', 'noopener,noreferrer');
                            });
                            publicLinksContainer.appendChild(a);
                        });
                    }
                    showView(viewPublicProfile);
                } catch (err) {
                    console.error(err);
                    showToast('Erreur chargement profil public', 'error');
                    publicDisplayName.textContent = 'Erreur';
                    publicBio.textContent = '';
                }
                hideLoader();
            }

            // ==================== HANDLERS ====================
            async function finishOnboarding() {
                if (!currentUser || !firebaseReady) return;
                setButtonLoading(btnFinishOnboarding, $('#btnFinishOnboardingSpinner'), $('#btnFinishOnboardingText'), true);
                try {
                    const platforms = Array.from(selectedOnboardingPlatforms);
                    const bio = onboardingBio.value.trim();
                    await saveUserProfile(currentUser.uid, {
                        onboardingCompleted: true,
                        onboardingPlatforms: platforms,
                        bio: bio
                    });
                    userProfile = await fetchUserProfile(currentUser.uid);
                    showToast('Profil configuré !', 'success');
                    navigateToDashboard();
                } catch (err) {
                    showToast('Erreur : ' + err.message, 'error');
                }
                setButtonLoading(btnFinishOnboarding, $('#btnFinishOnboardingSpinner'), $('#btnFinishOnboardingText'), false);
            }

            async function skipOnboarding() {
                if (!currentUser || !firebaseReady) return;
                try {
                    await saveUserProfile(currentUser.uid, { onboardingCompleted: true });
                    userProfile = await fetchUserProfile(currentUser.uid);
                    navigateToDashboard();
                } catch (err) {
                    navigateToDashboard();
                }
            }

            async function saveDashboard() {
                if (!currentUser || !firebaseReady || isSaving) return;
                isSaving = true;
                setButtonLoading(btnSaveDashboard, $('#btnSaveDashboardSpinner'), $('#btnSaveDashboardText'), true);
                try {
                    // Sauvegarder infos profil
                    await saveUserProfile(currentUser.uid, {
                        displayName: dashboardDisplayName.value.trim() || 'Utilisateur',
                        bio: dashboardBio.value.trim()
                    });

                    // Diff liens
                    const currentIds = localLinks.map(l => l.id).filter(id => id);
                    const originalIds = originalLinks.map(l => l.id);
                    const toDelete = originalIds.filter(id => !currentIds.includes(id));
                    await saveLinksBatch(currentUser.uid, localLinks, toDelete);

                    // Mettre à jour originaux et recharger pour avoir les clics à jour
                    originalLinks = JSON.parse(JSON.stringify(localLinks));
                    const updatedLinks = await fetchUserLinks(currentUser.uid);
                    localLinks = updatedLinks.map(l => ({ ...l }));
                    renderLinks();
                    showToast('Tout est sauvegardé ! ✅', 'success');
                } catch (err) {
                    console.error(err);
                    showToast('Erreur de sauvegarde : ' + err.message, 'error');
                }
                setButtonLoading(btnSaveDashboard, $('#btnSaveDashboardSpinner'), $('#btnSaveDashboardText'), false);
                isSaving = false;
            }

            async function handleAvatarUpload(file) {
                if (!file || !file.type.startsWith('image/')) { showToast('Image invalide', 'error'); return; }
                if (file.size > 5 * 1024 * 1024) { showToast('Max 5 Mo', 'error'); return; }
                showLoader();
                try {
                    const url = await uploadToCloudinary(file);
                    await saveUserProfile(currentUser.uid, { photoURL: url });
                    userProfile.photoURL = url;
                    updateDashboardAvatar(url, userProfile.displayName);
                    showToast('Photo de profil mise à jour 📸', 'success');
                } catch (err) {
                    showToast('Erreur upload : ' + err.message, 'error');
                }
                hideLoader();
                avatarFileInput.value = '';
            }

            async function handlePreviewUpload(file) {
                if (!file || !file.type.startsWith('image/')) { showToast('Image invalide', 'error'); return; }
                if (file.size > 5 * 1024 * 1024) { showToast('Max 5 Mo', 'error'); return; }
                showLoader();
                try {
                    const url = await uploadToCloudinary(file);
                    await saveUserProfile(currentUser.uid, { previewImageURL: url });
                    userProfile.previewImageURL = url;
                    previewThumbnail.src = url;
                    previewThumbnailContainer.style.display = 'block';
                    showToast('Image d\'aperçu enregistrée 🖼️', 'success');
                } catch (err) {
                    showToast('Erreur upload : ' + err.message, 'error');
                }
                hideLoader();
                previewFileInput.value = '';
            }

            function addLink() {
                localLinks.push({
                    id: null, // sera généré par Firestore
                    platform: 'site',
                    url: '',
                    active: true,
                    clicks: 0
                });
                renderLinks();
                setTimeout(() => {
                    const last = linksContainer.lastElementChild;
                    if (last) last.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
                showToast('Nouveau lien ajouté (à enregistrer)', 'info');
            }

            // ==================== EVENT LISTENERS ====================
            tabLogin.addEventListener('click', () => switchAuthTab('login'));
            tabRegister.addEventListener('click', () => switchAuthTab('register'));
            formLogin.addEventListener('submit', e => { e.preventDefault();
                handleLogin(loginEmail.value.trim(), loginPassword.value); });
            formRegister.addEventListener('submit', e => { e.preventDefault();
                handleRegister(registerEmail.value.trim(), registerPassword.value); });
            btnGoogleAuth.addEventListener('click', handleGoogleAuth);

            btnFinishOnboarding.addEventListener('click', finishOnboarding);
            btnSkipOnboarding.addEventListener('click', skipOnboarding);
            $$('#onboardingPlatforms .platform-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const p = chip.dataset.platform;
                    if (selectedOnboardingPlatforms.has(p)) {
                        selectedOnboardingPlatforms.delete(p);
                        chip.classList.remove('selected');
                    } else {
                        selectedOnboardingPlatforms.add(p);
                        chip.classList.add('selected');
                    }
                });
            });

            btnUploadAvatar.addEventListener('click', () => avatarFileInput.click());
            avatarFileInput.addEventListener('change', e => {
                if (e.target.files[0]) handleAvatarUpload(e.target.files[0]);
            });
            btnUploadPreview.addEventListener('click', () => previewFileInput.click());
            previewFileInput.addEventListener('change', e => {
                if (e.target.files[0]) handlePreviewUpload(e.target.files[0]);
            });
            btnAddLink.addEventListener('click', addLink);
            btnSaveDashboard.addEventListener('click', saveDashboard);
            btnLogout.addEventListener('click', handleLogout);

            document.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && e.key === 's' && currentView === viewDashboard) {
                    e.preventDefault();
                    saveDashboard();
                }
            });

            // ==================== ROUTEUR INITIAL ====================
            function checkPublicRoute() {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (id) {
                    navigateToPublicProfile(id);
                    return true;
                }
                return false;
            }

            if (firebaseReady && auth) {
                auth.onAuthStateChanged(async (user) => {
                    if (checkPublicRoute()) {
                        currentUser = user;
                        return;
                    }
                    currentUser = user;
                    if (user) {
                        try {
                            userProfile = await fetchUserProfile(user.uid);
                            if (!userProfile) {
                                const defaultProfile = {
                                    displayName: user.email ? user.email.split('@')[0] : 'Utilisateur',
                                    bio: '',
                                    photoURL: '',
                                    previewImageURL: '',
                                    onboardingCompleted: false,
                                    onboardingPlatforms: [],
                                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                                };
                                await saveUserProfile(user.uid, defaultProfile);
                                userProfile = await fetchUserProfile(user.uid);
                            }
                            if (!userProfile.onboardingCompleted) {
                                navigateToOnboarding();
                            } else {
                                navigateToDashboard();
                            }
                        } catch (err) {
                            console.error(err);
                            showToast('Erreur chargement profil', 'error');
                            navigateToAuth();
                        }
                    } else {
                        navigateToAuth();
                    }
                    hideLoader();
                });
            } else {
                hideLoader();
                if (!checkPublicRoute()) {
                    navigateToAuth();
                    showToast('Firebase non configuré — mode démo.', 'info');
                }
            }

            // Démasquer le loader après court délai
            window.addEventListener('load', () => {
                setTimeout(() => hideLoader(), 400);
            });
            console.log('🚀 LinkExt prêt — Compteur de clics, Cloudinary & Firestore.');
        })();
    </script>
</body>
</html>
